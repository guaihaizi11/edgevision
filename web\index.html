<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>EdgeVision - Video Behavior Analysis System</title>
  <script src=\"https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js\"></script>
  <script src=\"https://cdn.jsdelivr.net/npm/vue-demi@0.14.10/lib/index.iife.js\"></script>
  <script src=\"https://cdn.jsdelivr.net/npm/vue-router@4.3.0/dist/vue-router.global.prod.js\"></script>
  <script src=\"https://cdn.jsdelivr.net/npm/pinia@2.2.4/dist/pinia.iife.prod.js\"></script>
  <script src=\"https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js\"></script>
  <link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/element-plus@2.7.0/dist/index.css\" />
  <script src=\"https://cdn.jsdelivr.net/npm/element-plus@2.7.0/dist/index.full.min.js\"></script>
  <script src=\"https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js\"></script>
  <style>
    :root {
      --primary: #409EFF; --success: #67C23A; --warning: #E6A23C;
      --danger: #F56C6C; --info: #909399; --bg: #0a0e1a; --card: #111827;
      --sidebar: #0d1117; --text: #e5e7eb; --text2: #9ca3af; --border: #1f2937;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body,#app { width:100%; height:100%; font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
    .login-page { display:flex; align-items:center; justify-content:center; height:100%; background:linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%); }
    .login-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:40px; width:400px; box-shadow:0 8px 32px rgba(0,0,0,.3); }
    .login-header { text-align:center; margin-bottom:30px; }
    .login-header h1 { color:var(--primary); font-size:28px; margin:12px 0 4px; }
    .login-header p { color:var(--text2); font-size:14px; }
    .login-footer { text-align:center; color:#4b5563; font-size:12px; margin-top:20px; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div id=\"app\"></div>
  <script src=\"/app.js\"></script>
</body>
</html>
